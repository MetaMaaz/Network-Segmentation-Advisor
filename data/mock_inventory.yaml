# Hand-written mock of a realistic *flat* small-business network
# (everything on 192.168.1.0/24, no segmentation). This file uses the exact
# same format discovery.py produces, so the entire analysis pipeline runs
# against it with zero network access — the main development/test loop.
source: mock
hosts:
  - ip: 192.168.1.5
    hostname: dc-01
    os: Windows Server 2022
    services:
      - {port: 53,  protocol: tcp, name: domain,        version: Simple DNS Plus}
      - {port: 88,  protocol: tcp, name: kerberos-sec,  version: Microsoft Windows Kerberos}
      - {port: 135, protocol: tcp, name: msrpc,         version: Microsoft Windows RPC}
      - {port: 389, protocol: tcp, name: ldap,          version: Microsoft Windows AD LDAP}
      - {port: 445, protocol: tcp, name: microsoft-ds,  version: ""}
      - {port: 636, protocol: tcp, name: ldapssl,       version: ""}

  - ip: 192.168.1.10
    hostname: web-01
    os: Ubuntu 22.04
    services:
      - {port: 22,  protocol: tcp, name: ssh,   version: OpenSSH 9.6}
      - {port: 80,  protocol: tcp, name: http,  version: nginx 1.24.0}
      - {port: 443, protocol: tcp, name: https, version: nginx 1.24.0}

